version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: eye_boutique_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eye_boutique}
      POSTGRES_USER: ${POSTGRES_USER:-eye_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eye_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eye_admin} -d ${POSTGRES_DB:-eye_boutique}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eye_boutique_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eye_boutique_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["/app/entrypoint.sh"]

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eye_boutique_celery_worker
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker", "-l", "INFO"]

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eye_boutique_celery_beat
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "beat", "-l", "INFO"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eye_boutique_frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
